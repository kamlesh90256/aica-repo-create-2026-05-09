version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    container_name: aica-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-aica}
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aica-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: aica-backend
    env_file:
      - ./backend/.env.local
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-aica}
      NODE_ENV: development
    ports:
      - '4000:4000'
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aica-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aica-frontend
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/app:/app/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - aica-network

volumes:
  db-data:
    driver: local

networks:
  aica-network:
    driver: bridge
