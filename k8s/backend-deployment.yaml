apiVersion: apps/v1
kind: Deployment
metadata:
  name: aica-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aica-backend
  template:
    metadata:
      labels:
        app: aica-backend
    spec:
      containers:
        - name: backend
          image: yourrepo/aica-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aica-secrets
                  key: DATABASE_URL
