apiVersion: apps/v1
kind: Deployment
metadata:
  name: aica-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aica-frontend
  template:
    metadata:
      labels:
        app: aica-frontend
    spec:
      containers:
        - name: frontend
          image: yourrepo/aica-frontend:latest
          ports:
            - containerPort: 3000
