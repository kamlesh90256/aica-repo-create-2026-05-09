apiVersion: v1
kind: Secret
metadata:
  name: aica-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/aica"
  JWT_SECRET: "your-jwt-secret-key-change-this"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aica-config
data:
  NEXT_PUBLIC_API_URL: "https://api.yourdomain.com"
